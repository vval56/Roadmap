spring.application.name=roadmap

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5433}/${PGDATABASE:roadmap_db}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:${PGUSER:roadmap_user}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:${PGPASSWORD:roadmap_pass}}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=${SPRING_JPA_OPEN_IN_VIEW:false}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:never}

app.async.analytics-delay-ms=${APP_ASYNC_ANALYTICS_DELAY_MS:15000}
app.async.bulk-create-delay-ms=${APP_ASYNC_BULK_CREATE_DELAY_MS:15000}
app.async.executor.core-pool-size=${APP_ASYNC_EXECUTOR_CORE_POOL_SIZE:32}
app.async.executor.max-pool-size=${APP_ASYNC_EXECUTOR_MAX_POOL_SIZE:64}
app.async.executor.queue-capacity=${APP_ASYNC_EXECUTOR_QUEUE_CAPACITY:4096}
