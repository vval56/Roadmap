name: CI/CD Railway

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend-test:
    name: backend-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run backend tests
        run: ./mvnw -B test

  backend-build:
    name: backend-build
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build backend jar
        run: ./mvnw -B -DskipTests clean package

  frontend-build:
    name: frontend-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          npm ci --ignore-scripts --prefix frontend
          npm run build --prefix frontend

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - frontend-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build backend Docker image
        run: docker build -t roadmap-backend:ci .

      - name: Build frontend Docker image
        run: docker build -f frontend/Dockerfile -t roadmap-frontend:ci frontend

  docker-smoke:
    name: docker-smoke
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Start compose stack
        run: |
          cp .env.example .env
          docker compose up -d --build

      - name: Wait for local backend health
        run: |
          set -euo pipefail
          ATTEMPTS=30
          SLEEP_SECONDS=6
          for i in $(seq 1 "$ATTEMPTS"); do
            CODE="$(curl -s -o /tmp/local-health.json -w "%{http_code}" http://localhost:8080/actuator/health || true)"
            if [ "$CODE" = "200" ] && grep -Eq '"status"[[:space:]]*:[[:space:]]*"UP"' /tmp/local-health.json; then
              echo "Local healthcheck passed on attempt $i"
              cat /tmp/local-health.json
              exit 0
            fi
            echo "Attempt $i/$ATTEMPTS: local backend not ready (http=$CODE)"
            sleep "$SLEEP_SECONDS"
          done
          echo "Local healthcheck failed."
          docker compose logs app || true
          exit 1

      - name: API smoke test
        run: |
          set -euo pipefail
          CODE="$(curl -s -o /tmp/local-roadmaps.json -w "%{http_code}" http://localhost:8080/api/roadmaps || true)"
          if [ "$CODE" != "200" ]; then
            echo "Smoke request failed (http=$CODE)"
            cat /tmp/local-roadmaps.json || true
            docker compose logs app || true
            exit 1
          fi

      - name: Stop compose stack
        if: always()
        run: docker compose down -v

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: docker-smoke
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
      RAILWAY_ENVIRONMENT_ID_VAR: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
      RAILWAY_BACKEND_SERVICE: ${{ vars.RAILWAY_BACKEND_SERVICE }}
      RAILWAY_FRONTEND_SERVICE: ${{ vars.RAILWAY_FRONTEND_SERVICE }}
      APP_HEALTHCHECK_URL: ${{ vars.APP_HEALTHCHECK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Validate CI/CD variables
        run: |
          set -euo pipefail
          if [ -z "${RAILWAY_TOKEN:-}" ]; then echo "Missing secret RAILWAY_TOKEN"; exit 1; fi
          if [ -z "${RAILWAY_PROJECT_ID:-}" ]; then echo "Missing secret RAILWAY_PROJECT_ID"; exit 1; fi
          if [ -z "${RAILWAY_BACKEND_SERVICE:-}" ]; then echo "Missing variable RAILWAY_BACKEND_SERVICE"; exit 1; fi
          if [ -z "${RAILWAY_FRONTEND_SERVICE:-}" ]; then echo "Missing variable RAILWAY_FRONTEND_SERVICE"; exit 1; fi
          if [ -z "${APP_HEALTHCHECK_URL:-}" ]; then echo "Missing variable APP_HEALTHCHECK_URL"; exit 1; fi
          RAILWAY_ENV_SELECTED="${RAILWAY_ENVIRONMENT_ID:-${RAILWAY_ENVIRONMENT_ID_VAR:-production}}"
          echo "RAILWAY_ENV_SELECTED=${RAILWAY_ENV_SELECTED}" >> "$GITHUB_ENV"
          echo "Using Railway environment: ${RAILWAY_ENV_SELECTED}"

      - name: Deploy backend service
        run: |
          npx -y @railway/cli up \
            --ci \
            --detach \
            --project "${RAILWAY_PROJECT_ID}" \
            --environment "${RAILWAY_ENV_SELECTED}" \
            --service "${RAILWAY_BACKEND_SERVICE}"

      - name: Deploy frontend service
        run: |
          npx -y @railway/cli up frontend \
            --ci \
            --detach \
            --path-as-root \
            --project "${RAILWAY_PROJECT_ID}" \
            --environment "${RAILWAY_ENV_SELECTED}" \
            --service "${RAILWAY_FRONTEND_SERVICE}"

      - name: Wait for deployment and run healthcheck
        run: |
          set -euo pipefail
          ATTEMPTS=40
          SLEEP_SECONDS=10
          for i in $(seq 1 "$ATTEMPTS"); do
            CODE="$(curl -s -o /tmp/health.json -w "%{http_code}" "${APP_HEALTHCHECK_URL}" || true)"
            if [ "$CODE" = "200" ] && grep -Eq '"status"[[:space:]]*:[[:space:]]*"UP"' /tmp/health.json; then
              echo "Healthcheck passed on attempt $i"
              cat /tmp/health.json
              exit 0
            fi
            echo "Attempt $i/$ATTEMPTS: health not ready (http=$CODE). Waiting..."
            sleep "$SLEEP_SECONDS"
          done
          echo "Healthcheck failed after $ATTEMPTS attempts."
          cat /tmp/health.json || true
          exit 1
